<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbis - Autenticação</title>
    <!-- suport mobile -->
    <link rel="manifest" href="manifest.json" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Fluxo" />

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card" id="card-autenticacao">
        <div class="login-header">
          <div class="logo-ponto"></div>
          <h2>Aceder ao Fluxo</h2>
          <p>Gerencie suas finanças com alto padrão</p>
        </div>

        <div class="tabs-control">
          <button class="tab-btn active" id="tab-entrar">Entrar</button>
          <button class="tab-btn" id="tab-cadastrar">Criar Conta</button>
        </div>

        <form id="form-autenticar">
          <div class="form-group-comum" id="grupo-nome" style="display: none">
            <label for="login-nome">Nome Completo</label>
            <input type="text" id="login-nome" placeholder="Ex: Kauã Silva" />
          </div>

          <div class="form-group-comum">
            <label for="login-email">E-mail Corporativo</label>
            <input
              type="email"
              id="login-email"
              required
              placeholder="seu@email.com"
            />
          </div>

          <div class="form-group-comum">
            <label for="login-senha">Senha de Acesso</label>
            <input
              type="password"
              id="login-senha"
              required
              placeholder="••••••••"
            />
          </div>

          <button
            type="submit"
            class="btn btn-primary"
            id="btn-submit-auth"
            style="width: 100%; margin-top: 10px"
          >
            Acessar Painel
          </button>
        </form>
      </div>

      <div
        class="login-card dev-panel-card"
        id="card-developer"
        style="display: none"
      >
        <div class="login-header">
          <div
            class="logo-ponto"
            style="
              background-color: #ef4444;
              box-shadow: 0 0 14px rgba(239, 68, 68, 0.4);
            "
          ></div>
          <h2>Console do Desenvolvedor</h2>
          <p>Auditoria de Contas e Gerenciamento Interno</p>
        </div>

        <div style="text-align: left; margin-bottom: 20px">
          <h4
            style="
              font-size: 11px;
              text-transform: uppercase;
              color: var(--text-muted);
              margin-bottom: 12px;
              letter-spacing: 0.5px;
            "
          >
            Usuários Registrados no LocalStorage
          </h4>
          <div
            id="dev-lista-usuarios"
            style="
              display: flex;
              flex-direction: column;
              gap: 12px;
              max-height: 280px;
              overflow-y: auto;
              padding-right: 5px;
            "
          ></div>
        </div>

        <button
          type="button"
          class="btn btn-secondary"
          id="btn-fechar-dev"
          style="width: 100%"
        >
          Voltar para o Login
        </button>
      </div>
    </div>

    <script src="js/global.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
