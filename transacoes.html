<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbis - Transações</title>
         <!-- suport mobile -->
   <link rel="manifest" href="manifest.json" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Fluxo" />

    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/transacoes.css" />
  </head>
  <body>
    <div class="app-container">
      
      <aside class="sidebar" id="sidebar-main">
        <div class="sidebar-top">
          <div class="app-logo">
            <div class="logo-icon"></div>
            <span class="sidebar-text">Fluxo</span>
          </div>
          <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" title="Dashboard">
              <span class="nav-icon">📊</span>
              <span class="sidebar-text">Dashboard</span>
            </a>
            <a href="transacoes.html" class="nav-item active" title="Transações">
              <span class="nav-icon">💸</span>
              <span class="sidebar-text">Transações</span>
            </a>
            <a href="metas.html" class="nav-item" title="Metas">
              <span class="nav-icon">🎯</span>
              <span class="sidebar-text">Metas</span>
            </a>
          </nav>
        </div>

        <div class="sidebar-footer">
          <div class="user-profile">
            <div class="avatar">KU</div>
            <div class="user-info sidebar-text">
              <span class="user-name">Carregando...</span>
              <span class="user-plan">Plano Premium</span>
            </div>
          </div>
          <button id="btn-logout" class="btn-logout" title="Sair da Conta">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span class="sidebar-text">Sair da Conta</span>
          </button>
        </div>
      </aside>

      <button class="sidebar-toggle" id="btn-sidebar-toggle">☰</button>

      <main class="main-content">
        <header class="content-header">
          <div class="greeting-box">
            <h1>Extrato Geral</h1>
            <p>
              Consulte, filtre e gerencie todas as suas movimentações
              financeiras.
            </p>
          </div>
          <div class="header-actions">
            <button class="btn btn-secondary" id="btn-blur">
              👁️ Anonimato
            </button>
          </div>
        </header>

        <div class="card">
          <div class="section-header">
            <h3>Histórico de Movimentações</h3>
            <div style="display: flex; gap: 10px">
              <select
                id="filter-mes-tabela"
                class="form-select"
                style="background: #09090e"
              >
                <option value="todos">Todos os Meses</option>
                <option value="01">Janeiro</option>
                <option value="02">Fevereiro</option>
                <option value="03">Março</option>
                <option value="04">Abril</option>
                <option value="05">Maio</option>
                <option value="06">Junho</option>
                <option value="07">Julho</option>
                <option value="08">Agosto</option>
                <option value="09">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
              </select>

              <select
                id="filter-ano-tabela"
                class="form-select"
                style="background: #09090e"
              ></select>

              <select
                id="filter-tipo"
                class="form-select"
                style="background: #09090e"
              >
                <option value="todos">Todos os Tipos</option>
                <option value="ganho">Apenas Ganhos</option>
                <option value="gasto">Apenas Gastos</option>
              </select>
            </div>
          </div>

          <div class="table-responsive-container" style="margin-top: 24px">
            <table class="finance-table">
              <thead>
                <tr>
                  <th>Descrição</th>
                  <th>Categoria</th>
                  <th>Data</th>
                  <th>Tipo</th>
                  <th style="text-align: right">Valor</th>
                  <th style="text-align: center">Ações</th>
                </tr>
              </thead>
              <tbody id="table-transactions-body"></tbody>
            </table>
          </div>
        </div>
      </main>

      <aside class="right-panel">
        
        <div class="quick-add-box">
            <h3 style="font-size: 14px; margin-bottom: 8px;">Inserção Rápida</h3>
            <div class="quick-add-input-wrap">
                <input type="text" id="quick-input" placeholder="-35 Lanche ou +120 Freela">
                <button id="quick-add-btn" class="pos" style="background: none;">➔</button>
            </div>
        </div>

        <div>
            <h3 style="font-size: 14px; margin-bottom: 16px;">Atividade Recente</h3>
            <div id="transaction-container">
                </div>
        </div>
        
      </aside>
    </div>

    <script src="./js/global.js"></script>
    <script src="./js/transacoes.js"></script>
  </body>
</html>
